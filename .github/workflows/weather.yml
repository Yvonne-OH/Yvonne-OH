name: Update Weather

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get weather
        run: |
          curl "https://wttr.in/Singapore?format=3" > weather.txt

      - name: Update README
        run: |
          WEATHER=$(cat weather.txt)
          sed -i "s/<!--WEATHER-->.*<!--WEATHER-->/<!--WEATHER-->$WEATHER<!--WEATHER-->/" README.md

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add README.md
          git commit -m "update weather" || echo "no changes"
          git push
