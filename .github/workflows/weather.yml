name: Update Weather Table

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate weather block
        run: |
          get_weather () {
            city=$1
            curl -s "https://wttr.in/${city}?format=%c+%t&u"
          }

          BJ=$(get_weather Beijing)
          SH=$(get_weather Shanghai)
          WX=$(get_weather Wuxi)
          PH=$(get_weather Philadelphia)

          {
            echo '```'
            printf "%-14s %s\n" "City" "Weather"
            printf "%-14s %s\n" "--------------" "--------"
            printf "%-14s %s\n" "Beijing" "$BJ"
            printf "%-14s %s\n" "Shanghai" "$SH"
            printf "%-14s %s\n" "Wuxi" "$WX"
            printf "%-14s %s\n" "Philadelphia" "$PH"
            echo '```'
          } > weather.txt

      - name: Inject into README
        run: |
          awk '
          /<!--WEATHER_BLOCK_START-->/ {print; system("cat weather.txt"); skip=1; next}
          /<!--WEATHER_BLOCK_END-->/ {skip=0}
          !skip
          ' README.md > README_new.md
          mv README_new.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "weather-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add README.md
          git commit -m "update weather" || echo "no changes"
          git push
