name: Update Exchange Rates

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update-fx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Generate FX dashboard
        run: |
          today=$(date +%F)
          yesterday=$(date -d "yesterday" +%F)

          # 用 USD 做基准（最稳定）
          data_today=$(curl -s "https://api.exchangerate.host/latest?base=USD")
          data_yesterday=$(curl -s "https://api.exchangerate.host/$yesterday?base=USD")

          get_rate () {
            code=$1
            flag=$2

            usd_to_cny=$(echo "$data_today" | jq -r '.rates.CNY')
            usd_to_code=$(echo "$data_today" | jq -r ".rates.$code")

            usd_to_cny_y=$(echo "$data_yesterday" | jq -r '.rates.CNY')
            usd_to_code_y=$(echo "$data_yesterday" | jq -r ".rates.$code")

            # 防止 null / 空值
            if [ "$usd_to_code" = "null" ] || [ -z "$usd_to_code" ]; then
              printf "%-14s %-14s %s\n" "$flag $code" "N/A" "⚠️"
              return
            fi

            # 计算：1 code = ? CNY
            rate_today=$(echo "$usd_to_cny / $usd_to_code" | bc -l)
            rate_yesterday=$(echo "$usd_to_cny_y / $usd_to_code_y" | bc -l)

            # 防止异常
            rate_today=${rate_today:-0}
            rate_yesterday=${rate_yesterday:-0}

            rate=$(printf "%.3f" "$rate_today")

            # 判断涨跌
            trend="→"
            if (( $(echo "$rate_today > $rate_yesterday" | bc -l) )); then
              trend="📈"
            elif (( $(echo "$rate_today < $rate_yesterday" | bc -l) )); then
              trend="📉"
            fi

            printf "%-14s %-14s %s\n" "$flag $code" "$rate" "$trend"
          }

          {
            echo '```'
            printf "%-14s %-14s %s\n" "Currency" "Rate (→ CNY)" "Trend"
            printf "%-14s %-14s %s\n" "--------------" "--------------" "------"

            get_rate USD "🇺🇸"
            get_rate JPY "🇯🇵"
            get_rate EUR "🇪🇺"
            get_rate GBP "🇬🇧"

            echo '```'
          } > fx.txt

      - name: Inject into README
        run: |
          awk '
          /<!--FX_BLOCK_START-->/ {
            print;
            system("cat fx.txt");
            skip=1;
            next
          }
          /<!--FX_BLOCK_END-->/ {skip=0}
          !skip
          ' README.md > README_new.md
          mv README_new.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "fx-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add README.md
          git commit -m "update fx rates" || echo "no changes"
          git push
        run: |
