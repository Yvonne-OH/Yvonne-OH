- name: Generate FX dashboard
  run: |
    # 永远用 latest（避免周末炸）
    data_today=$(curl -s "https://api.frankfurter.app/latest?from=USD")

    # fallback：再取一次 latest（模拟 yesterday）
    data_yesterday=$(curl -s "https://api.frankfurter.app/latest?from=USD")

    get_rate () {
      code=$1
      flag=$2

      usd_to_cny=$(echo "$data_today" | jq -r '.rates.CNY')
      usd_to_code=$(echo "$data_today" | jq -r ".rates.$code")

      # 防止 jq 失败
      if [ -z "$usd_to_code" ] || [ "$usd_to_code" = "null" ]; then
        printf "%-14s %-14s %s\n" "$flag $code" "N/A" "⚠️"
        return
      fi

      # 计算 1 code → CNY
      rate=$(echo "$usd_to_cny / $usd_to_code" | bc -l)
      rate=$(printf "%.3f" "$rate")

      # ⚠️ 暂时趋势固定（稳定优先）
      trend="→"

      printf "%-14s %-14s %s\n" "$flag $code" "$rate" "$trend"
    }

    {
      echo '```'
      printf "%-14s %-14s %s\n" "Currency" "Rate (→ CNY)" "Trend"
      printf "%-14s %-14s %s\n" "--------------" "--------------" "------"

      get_rate USD "🇺🇸"
      get_rate JPY "🇯🇵"
      get_rate EUR "🇪🇺"
      get_rate GBP "🇬🇧"

      echo '```'
    } > fx.txt
